services:
  postgres:
    image: postgres:15-alpine
    container_name: mold_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       molddb
      POSTGRES_USER:     mold_user
      POSTGRES_PASSWORD: mold_pass_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    # Không publish port 5432 ra ngoài — Directus/API kết nối qua mạng nội bộ Docker.
    # Nếu cần bảo trì DB từ máy host, tạm bỏ comment 2 dòng dưới rồi chạy lại docker compose up -d
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mold_user -d molddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:10.13.2
    container_name: mold_directus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET: "km2100_directus_secret_2024"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "molddb"
      DB_USER: "mold_user"
      DB_PASSWORD: "mold_pass_2024"
      # Lưu ý: 2 biến dưới chỉ có tác dụng khi khởi tạo DB trống.
      # DB được seed từ file dump nên tài khoản thật nằm trong dump: admin@khuon.com / AdminKM2100x
      ADMIN_EMAIL: "admin@khuon.com"
      ADMIN_PASSWORD: "AdminKM2100x"
      PUBLIC_URL: "http://localhost:8080"
      WEBSOCKETS_ENABLED: "true"
      FLOWS_EXEC_ALLOWED_MODULES: "array-flatten,body-parser,winston"
      LOG_LEVEL: "warn"
      TELEMETRY: "false"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    ports:
      - "8080:8055"

  api_server:
    build: ./dashboard
    container_name: mold_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dashboard/server.js:/app/server.js:ro
    ports:
      - "3001:3001"

  dashboard:
    image: nginx:alpine
    container_name: mold_dashboard
    restart: unless-stopped
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    ports:
      - "3000:80"

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:

