<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Quản Lý Khuôn - MS Access Clone</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=38">
</head>
<body>
  <!-- Màn hình Đăng nhập (Login Overlay) -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-box">
      <h2>Đăng Nhập</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Mật khẩu" required>
        <div id="login-error" class="error-text" style="display:none;">Sai tài khoản hoặc mật khẩu</div>
        <button type="submit" id="btn-login-submit">Đăng Nhập</button>
      </form>
    </div>
  </div>

  <!-- Vùng chứa các form chức năng (Pages) -->
  <main class="main-container">
    
    <!-- F_Main: Switchboard -->
    <div class="page active" id="page-dashboard">
      <div class="switchboard-form" id="switchboard-view">
        <div class="user-profile-menu" id="user-profile-menu" style="display: none;">
          <div class="user-info">
            <span id="current-user-name" class="user-name"></span>
            <span id="current-user-role" class="role-badge"></span>
          </div>
          <button class="logout-btn" onclick="API_REF.logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        
        <div class="form-header">
          <img src="img/logo.png" alt="Shalumi Logo" style="height: 70px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,240,255,0.15);">
          <div class="company-title">CÔNG TY CỔ PHẦN TẬP ĐOÀN NHÔM SÔNG HỒNG <span>SHALUMI</span></div>
          <h2 class="system-title">THEO DÕI KHUÔN PKT</h2>
        </div>
        
                <div class="switchboard-grid">
          
          <!-- Column 1 & 1B Container -->
          <div class="sw-col-container">
            <!-- Box 1 -->
            <fieldset class="sw-group">
              <legend class="sw-legend">NHẬP SỐ LIỆU - TH THEO PHỐI</legend>
              <div class="sw-content">
                <button class="sw-btn" onclick="openDualGrid('nhatky_khuon', 'khuon_hong')"><span class="sw-dot"></span> Vào số liệu</button>
                <button class="sw-btn" onclick="openGrid('nhatky_khuon')"><span class="sw-dot"></span> Sử lý nhật ký khuôn <span class="sw-badge" style="color:#d97706;font-weight:bold;margin-left:5px">2026</span></button>
                <button class="sw-btn" onclick="aggregateMoldData(event)"><span class="sw-dot"></span> Cập nhật tổng hợp số liệu - Phôi</button>
                <button class="sw-btn" onclick="openGrid('tonghop_phoi')"><span class="sw-dot"></span> Bảng tổng hợp số liệu - Phôi</button>
                
                <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                  <label title="Tên khuôn / khoảng ngày / đơn hàng"><i class="fas fa-filter" style="color:#38bdf8; margin-right:3px;"></i> Lọc Tổng khuôn</label>
                  <input type="text" id="sw-filter-ten" style="width: 50px;" placeholder="Tên">
                  <input type="date" id="sw-filter-date1" style="width: 100px;">
                  <input type="date" id="sw-filter-date2" style="width: 100px;">
                  <input type="text" id="sw-filter-dh" style="width: 40px;" placeholder="ĐH">
                  <button class="sw-btn" style="width:52px;flex:none;padding:2px" onclick="searchTongKhuon()">Lọc</button>
                </div>

                <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                  <button class="sw-btn" style="flex:1" onclick="openNhanKhuon('sw-nhankhuon-hang')"><span class="sw-dot"></span> Vào nhập khuôn</button>
                  <input type="text" id="sw-nhankhuon-hang" style="width: 70px;" placeholder="Hãng">
                </div>

                <button class="sw-btn" onclick="openGrid('tong_khuon')"><span class="sw-dot orange-dot"></span> Tìm sửa đợt Khuôn</button>
                <button class="sw-btn" onclick="openGrid('khuon_hong')"><span class="sw-dot"></span> Vào khuôn cần sửa</button>
                
                <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                  <label><i class="fas fa-lock" style="color:#94a3b8; margin-right:3px;"></i> Khối lượng CX</label>
                  <input type="text" style="width: 20px;" disabled>
                  <input type="text" style="width: 20px;" disabled>
                  <input type="text" style="width: 20px;" disabled>
                </div>
                
                <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                  <button class="sw-btn" style="flex:1" onclick="openDatKhuon()"><span class="sw-dot"></span> Kiểm tra đặt Khuôn</button>
                  <input type="text" id="sw-datkhuon-ten" style="width: 90px;" placeholder="Tên khuôn">
                </div>

                <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                  <button class="sw-btn" style="flex:1" onclick="openDonHang()"><span class="sw-dot"></span> Đơn hàng</button>
                  <input type="text" id="sw-donhang-so" style="width: 60px;" placeholder="Số đơn">
                </div>

                <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                  <button class="sw-btn" style="flex:1" onclick="openViTri()"><span class="sw-dot"></span> Vị trí</button>
                  <input type="text" id="sw-vitri" style="width: 60px;" placeholder="Vị trí">
                </div>

              </div>
            </fieldset>

            <!-- Box 1B -->
            <fieldset class="sw-group" style="margin-top:10px">
              <legend class="sw-legend" style="color:#0000ff">NGHIỆM THU</legend>
              <div class="sw-content">
                <div class="sw-input-row">
                  <button class="sw-btn" onclick="openBangKeNT()"><span class="sw-dot"></span> Bảng kê NT đợt</button>
                  <select id="sw-nt-dot" style="width:100px" onchange="openBangKeNT()"><option value="">-- Đợt --</option></select>
                </div>
              </div>
            </fieldset>
          </div>

          <!-- Box 2 -->
          <fieldset class="sw-group">
            <legend class="sw-legend">THEO KG SẢN PHẨM</legend>
            <div class="sw-content">
              <button class="sw-btn" onclick="aggregateMoldData(event)"><span class="sw-dot"></span> Cập nhật số liệu nhật ký</button>
              <button class="sw-btn" onclick="openGrid('tonghop_timkiem')"><span class="sw-dot orange-dot"></span> Bảng tổng hợp tìm kiếm</button>
              <button class="sw-btn" onclick="openGrid('khuon_nt_kt')"><span class="sw-dot"></span> Vào khuôn nghiệm thu</button>
              <button class="sw-btn" onclick="nghiemThuUpdate()"><span class="sw-dot"></span> Cập nhật số liệu nghiệm thu</button>
              <button class="sw-btn" onclick="openGrid('tonghop_nghiem_thu')"><span class="sw-dot"></span> Bảng số liệu khuôn nghiệm thu</button>
              <button class="sw-btn" onclick="nghiemThuSave()"><span class="sw-dot"></span> Lưu khuôn nghiệm thu</button>
              <button class="sw-btn" onclick="nghiemThuApDot()"><span class="sw-dot"></span> Áp đợt khuôn nghiện thu</button>
              <button class="sw-btn" onclick="openGrid('luu_nghiem_thu')"><span class="sw-dot"></span> Bảng lưu khuôn nghiệm thu</button>
              <button class="sw-btn" onclick="openGrid('khuon_hong')"><span class="sw-dot"></span> Vào khuon hỏng đã sửa</button>
              <button class="sw-btn" onclick="openGrid('khuon_hong', {})"><span class="sw-dot"></span> Bỏ Khuôn Hỏng</button>
            </div>
          </fieldset>

          <!-- Box 3 -->
          <fieldset class="sw-group">
            <legend class="sw-legend">BẢNG SỐ LIỆU</legend>
            <div class="sw-content">
              <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px">
                <button class="sw-btn" style="flex:1" onclick="openNhanKhuon('sw-nhankhuon3-hang')"><span class="sw-dot"></span> Bảng nhận khuôn</button>
                <input type="text" id="sw-nhankhuon3-hang" style="width: 70px;text-align:center" placeholder="Hãng">
              </div>
              <button class="sw-btn" onclick="openGrid('tong_khuon')"><span class="sw-dot"></span> Bảng tổng khuôn</button>
              <button class="sw-btn" onclick="openGrid('nhatky_khuon')"><span class="sw-dot"></span> Bảng nhật ký</button>
              <button class="sw-btn" onclick="openGrid('khuon_hong')"><span class="sw-dot"></span> Bảng khuôn hỏng</button>
              <button class="sw-btn" onclick="openGrid('thanh_ly')"><span class="sw-dot"></span> Bảng thanh lý</button>
              <button class="sw-btn" onclick="openGrid('lich_su_thanh_ly')"><span class="sw-dot"></span> Bảng lưu khuôn thanh lý</button>
              <button class="sw-btn" onclick="openGrid('khuon_nt_kt')"><span class="sw-dot"></span> Khuôn kiểm tra để nghiệm thu</button>
              <button class="sw-btn" onclick="openGrid('luu_nghiem_thu')"><span class="sw-dot"></span> Bảng lưu khuôn nghiệm thu</button>
            </div>
          </fieldset>

          <!-- Box 4 -->
          <fieldset class="sw-group">
            <legend class="sw-legend">THANH LÝ</legend>
            <div class="sw-content">
              <button class="sw-btn" onclick="moveDamagedToLiquidation()"><span class="sw-dot"></span> Chuyển khuôn hỏng sang thanh lý</button>
              <button class="sw-btn" onclick="archiveLiquidation()"><span class="sw-dot"></span> Lưu khuôn thanh lý</button>
              <button class="sw-btn" onclick="softDeleteLiquidation()"><span class="sw-dot"></span> Xóa khuôn thanh ly</button>
              <button class="sw-btn" onclick="openGrid('thanh_ly')"><span class="sw-dot"></span> Bảng thanh lý</button>
              <button class="sw-btn" onclick="openGrid('lich_su_thanh_ly')"><span class="sw-dot"></span> Bảng lưu khuôn thanh lý</button>
              <button class="sw-btn" onclick="openProductionReport('month')"><span class="sw-dot"></span> Sản phảm theo Tháng</button>
              <button class="sw-btn" onclick="openProductionReport('year')"><span class="sw-dot"></span> Sản phảm theo nam</button>
              <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px;">
                <button class="sw-btn" onclick="timKhuon()"><span class="sw-dot"></span> Vào khuôn</button>
                <input type="text" id="sw-vaokhuon" style="width: 70px;" placeholder="Tên khuôn">
              </div>
              <div class="sw-input-row" style="margin-top:2px;margin-bottom:2px;">
                <button class="sw-btn" onclick="timKhuon()"><span class="sw-dot"></span> Tìm Khuôn</button>
                <input type="text" id="sw-timkhuon" style="width: 90px;" placeholder="Tên khuôn">
              </div>
            </div>
          </fieldset>
          
        </div>


      </div>
    </div>
  </main>

  <script src="js/api_v2.js?v=43"></script>
  <script src="js/dashboard_v2.js?v=43"></script>
  <script src="js/access_grid.js?v=43"></script>
</body>
</html>
